name: CI — Lint, Type-check & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Quality Gate ──────────────────────────────────────────────────
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true  # warn but don't fail build

      - name: Run Jest tests
        run: npx jest --passWithNoTests --forceExit
        env:
          EXPO_PUBLIC_API_URL: https://api.freeapi.app

  # ── 2. EAS Preview APK (on push to main only) ────────────────────────
  build-preview:
    name: EAS Preview APK
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.EXPO_TOKEN != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android Preview APK
        run: eas build -p android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://api.freeapi.app
